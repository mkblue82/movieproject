
<main class="container">
  <div class="p-4 p-md-5 mb-4 rounded text-body-emphasis bg-body-secondary">
    <div class="col-lg-6 px-0">
      <h1 class="display-4 fst-italic">Movie Review</h1>
      <p class="lead my-3">お気に入りの映画をレビューして共有しよう！</p>

      {% if user.is_authenticated %}
      <!--  ログイン中の画面表示 -->
      <p class="lead mb-0"><a href="{% url 'movie:post' %}" class="text-body-emphasis fw-bold">レビューを投稿</a>
        &nbsp;&nbsp;&nbsp;
            <a href="{% url 'movie:post_movie_to_watch' %}" class="text-body-emphasis fw-bold">観たい映画を登録</a>
      </p>

      <!-- ログイン状態ではない場合の表示 -->
      {% else %}
      <p class="lead mb-0"><a href="{% url 'accounts:signup' %}" class="text-body-emphasis fw-bold">今すぐレビューする</a></p>
      {% endif %}
    </div>
  </div>
